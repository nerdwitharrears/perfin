<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(30,41,59,0.7);
  --border:rgba(255,255,255,0.08);
  --green:#22c55e;
  --red:#ef4444;
  --gold:#f59e0b;
  --blue:#3b82f6;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

/* GLOBAL */
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:var(--text);
}

/* GLASS CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  animation:fadeIn .4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

/* HEADER */
.header{
  padding:16px;
  font-weight:700;
  font-size:18px;
}

/* SUMMARY */
.summary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.summary div{
  padding:14px;
  border-radius:14px;
  background:var(--card);
}

.green{color:var(--green)}
.red{color:var(--red)}
.gold{color:var(--gold)}
.blue{color:var(--blue)}

/* MOBILE CARDS */
.list-item{
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  background:var(--card);
  border:1px solid var(--border);
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:4px 0;
}

.label{color:var(--muted)}

/* FORM */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:#020617;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-weight:600;
  margin-top:10px;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:80px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:28px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  color:white;
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid var(--border);
}

.nav button{
  background:none;
  font-size:12px;
  color:var(--muted);
}

.nav .active{color:var(--green)}
</style>
</head>

<body>

<div class="header">💰 Finance Pro</div>

<div id="dashboard">

<div class="summary">
  <div>Income<br><b id="inc">₹0</b></div>
  <div>Expense<br><b id="exp">₹0</b></div>
  <div>Invest<br><b id="inv">₹0</b></div>
  <div>Savings<br><b id="sav">₹0</b></div>
</div>

<div id="list"></div>

</div>

<div id="form" style="display:none" class="card">
  <input type="date" id="date">
  <select id="type">
    <option>Income</option>
    <option>Expense</option>
    <option>Investment</option>
  </select>
  <input type="number" id="amount" placeholder="Amount">
  <button onclick="add()">Save</button>
</div>

<button class="fab" onclick="toggleForm()">＋</button>

<div class="nav">
  <button class="active" onclick="showDash()">Home</button>
  <button onclick="showForm()">Add</button>
</div>

<script>
// SUPABASE
const db = supabase.createClient(
'https://rmiehhcinhjtzioxhfln.supabase.co',
'YOUR_KEY'
);

// UI
function showDash(){
  document.getElementById('dashboard').style.display='block';
  document.getElementById('form').style.display='none';
}

function showForm(){
  document.getElementById('dashboard').style.display='none';
  document.getElementById('form').style.display='block';
}

function toggleForm(){
  const f=document.getElementById('form');
  f.style.display = f.style.display==='none' ? 'block':'none';
}

// LOAD
async function load(){
  const {data}=await db.from('income').select('*');
  render(data);
}

function render(data){
  let html='';
  data.forEach(r=>{
    html+=`
    <div class="list-item">
      <div class="row"><span class="label">Date</span>${r.date}</div>
      <div class="row"><span class="label">Amount</span>₹${r.amount}</div>
    </div>`;
  });
  document.getElementById('list').innerHTML=html;
}

// ADD
async function add(){
  await db.from('income').insert([{
    date:date.value,
    amount:amount.value
  }]);
  load();
  showDash();
}

load();
</script>

</body>
</html>
